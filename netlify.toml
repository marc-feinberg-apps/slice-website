# Netlify deployment config for SLICE (TanStack Start + Vite).
# SSR is handled by @netlify/vite-plugin-tanstack-start, which turns the
# server build into a Netlify serverless function during `vite build`.

[build]
  # `pnpm build` runs the prebuild hook (generate-sitemap.mjs) then vite build,
  # so public/sitemap.xml is regenerated with a fresh <lastmod> on every deploy.
  command = "pnpm build"
  publish = "dist/client"

[build.environment]
  # Match the local toolchain (vite 8 / @types/node 22).
  NODE_VERSION = "22"

# Required environment variables (set these in the Netlify UI, NOT here —
# they are secrets and must stay out of version control):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY   — privileged reads + signed video URLs
#   SUPABASE_ANON_KEY           — user sign-in / cookie session (@supabase/ssr)
# Netlify dashboard → Site configuration → Environment variables.
